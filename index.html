    <style>
        *{

        body{
            height: 90vh;

            align-items: center;

        .mode{

        }
        .mode2 div{
            width: 7vh;
            height: 7vh;
            cursor: pointer;
            border-radius: 1.5vh;

            justify-content: center;
            align-items: center;
        }
        .img div{
            width: 80%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center center;
        }
        .abidos{
            background: linear-gradient(135deg, #112739, #113d5d);
        }
        .abidos div{
            width: 100% !important;
            height: 100% !important;
            background-image: url(https://cdn-lostark.game.onstove.com/efui_iconatlas/use/use_12_86.png);
        }
        .oreha{
            background: linear-gradient(135deg, #2e123c, #480d5d);
        }
        .oreha div{
            background-image: url(https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_11_29.png);
        }
        .sabidos{
            background: linear-gradient(135deg, #2e123c, #480d5d);
            outline: 3px solid #dd25ff;
        }
        .sabidos div{
            width: 100% !important;
            height: 100% !important;
            background-image: url(https://cdn-lostark.game.onstove.com/efui_iconatlas/use/use_13_252.png);
        }
        .mode2 .img > div{
            background: linear-gradient(135deg, #112739, #113d5d);
        }
        .mode2 .img:first-child > div{

        }
        .archeology div{
            background-image: url(https://cdn-lostark.game.onstove.com/efui_iconatlas/lifelevel/lifelevel_02_55.png);
        }
        .hunting div{
            background-image: url(https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_8_67.png);
        }
        .fishing div{
            background-image: url(https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_8_74.png);
        }

        form{
            display: flex;
            flex-direction: column;
        }
        form .img > div{
            width: 5vh;
            height: 5vh;
            border-radius: 1vh;
        }
        .img .a{
            background: linear-gradient(135deg, #112739, #113d5d);
        }
        .img .b{
            background: linear-gradient(135deg, #1e2d0b, #304911);
        }
        .img .c{
            background: linear-gradient(135deg, #313131, #585858);
        }
        .img .g{
            background: linear-gradient(135deg, #313131, #585858);
        }
        .img .a div{
            background-image: url(https://cdn-lostark.game.onstove.com/efui_iconatlas/lifelevel/lifelevel_02_55.png);
        }
        .img .b div{
            background-image: url(https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_9_4.png);
        }

        table{
            border: 1px solid black;

            padding: 1.5vh;
	        border-spacing: 0 10px;

        .result{
            display: none;
            border: 1px solid black;
            border-radius: 1vh;
            padding: 0.5vh 1.5vh;

        }
        .resultGold{

        }
        .flex{
            display: flex;
            align-items: center;
            @media (max-aspect-ratio: 1)  {
                flex-direction: column;
            }
        }
        .bg1{
            background-color: rgb(252 241 223);
        }
        .mokoko-wrap{
            position: fixed;
            bottom: 0;
            right: 2vw;
            width: 20vh;
            height: 20vh;

        }
        .visitor-count > div{
            display: flex;
            justify-content: space-between;
        }
        .mokoko-bubble{
            position: absolute;
            bottom: 100%;
            right: 0;
            background: white;
            border: 1px solid #bbb;
            border-radius: 1vh;
            padding: 1.2vh 1.5vh 3.5vh;
            font-size: 1.5vh;
            line-height: 2.3vh;
            white-space: nowrap;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .mokoko-bubble::before,
        .mokoko-bubble::after{
            content: '';
            position: absolute;
            top: 100%;
            right: calc(9vh - 7px);
            border-style: solid;
            border-color: transparent;
        }
        .mokoko-bubble::before{
            border-width: 8px 7px 0;
            border-top-color: #bbb;
        }
        .mokoko-bubble::after{
            border-width: 7px 6px 0;
            border-top-color: white;
            right: calc(9vh - 6px);
            margin-top: -1px;
        }
        .copy-btn{
            position: absolute;
            bottom: 0.8vh;
            right: 0.8vh;
            width: 2.2vh;
            height: 2.2vh;
            padding: 0;
            background: none;
            border: none;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .copy-btn:hover{
            color: #222;
        }
        .copy-btn svg{
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <script>
        var mode = 0;
        var mode2 = 0;
        const bgUrl = [
            'https://cdn-lostark.game.onstove.com/efui_iconatlas/lifelevel/lifelevel_02_55.png',    // 고고학 아비도스
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_9_11.png',    // 고고학 오레하
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_9_4.png',  // 고고학 고급
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_9_3.png',   // 고고학 일반
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_8_67.png', // 수렵 오레하
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_2_196.png',// 수렵 고급
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_2_192.png',// 수렵 일반
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_8_74.png', // 낚시 오레하
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_4_49.png', // 낚시 고급
            'https://cdn-lostark.game.onstove.com/EFUI_IconAtlas/Use/Use_1_142.png', // 낚시 일반
            "https://cdn-lostark.game.onstove.com/efui_iconatlas/shop_icon/shop_icon_31.png", // 융화제 상자
            "https://cdn-lostark.game.onstove.com/efui_iconatlas/use/use_13_252.png" // 상급 아비도스
        ];

        function init(){
            document.querySelector('.result').style.display = 'none';
            document.querySelector('.A').value = '';
            document.querySelector('.B').value = '';
            document.querySelector('.C').value = '';
            document.querySelector('.gold').value = '';
            document.querySelector('.powderInput').value = '';
        }

        function modeChange(m){
            init();

            mode = m;
            if (mode === 2){
                document.querySelector('.mode2').style.display = 'flex';
                document.querySelector('.resultBoxicon').style.background  = 'linear-gradient(135deg, #2e123c, #480d5d)';
                mode2Change(0);
            } else{
                document.querySelector('.mode2').style.display = 'none';
                document.querySelector('.resultBoxicon').style.background  = 'linear-gradient(135deg, #112739, #113d5d)';
                const as = document.querySelectorAll('.a');
                as.forEach((a)=>{
                    a.querySelector("div").style.backgroundImage  = `url(${bgUrl[0]})`;
                });
                const bs = document.querySelectorAll('.b');
                bs.forEach((b)=>{
                    b.querySelector("div").style.backgroundImage  = `url(${bgUrl[2]})`;
                });
                const cs = document.querySelectorAll('.c');
                cs.forEach((c)=>{
                    c.querySelector("div").style.backgroundImage  = `url(${bgUrl[3]})`;
                });
            }

            const modeChild = document.querySelector('.mode').children;
            for (let i = 0; i < modeChild.length; i++) {
                modeChild[i].children[0].style.outline = 'none';
            }
            modeChild[mode].children[0].style.outline = '3px solid #dd25ff';
        }
        function mode2Change(m){
            init();

            mode2 = m;
            const modeChild = document.querySelector('.mode2').children;
            for (let i = 0; i < modeChild.length; i++) {
                modeChild[i].children[0].style.outline = 'none';
            }
            modeChild[mode2].children[0].style.outline = '3px solid #dd25ff';

            const as = document.querySelectorAll('.a');
            const bs = document.querySelectorAll('.b');
            const cs = document.querySelectorAll('.c');

            if (mode2 === 0){
                as.forEach((a)=>{
                    a.querySelector("div").style.backgroundImage  = `url(${bgUrl[1]})`;
                })
                bs.forEach((b)=>{
                    b.querySelector("div").style.backgroundImage  = `url(${bgUrl[2]})`;
                })
                cs.forEach((c)=>{
                    c.querySelector("div").style.backgroundImage  = `url(${bgUrl[3]})`;
                })
            } else if (mode2 === 1){
                as.forEach((a)=>{
                    a.querySelector("div").style.backgroundImage  = `url(${bgUrl[4]})`;
                })
                bs.forEach((b)=>{
                    b.querySelector("div").style.backgroundImage  = `url(${bgUrl[5]})`;
                })
                cs.forEach((c)=>{
                    c.querySelector("div").style.backgroundImage  = `url(${bgUrl[6]})`;
                })
            } else {
                as.forEach((a)=>{
                    a.querySelector("div").style.backgroundImage  = `url(${bgUrl[7]})`;
                })
                bs.forEach((b)=>{
                    b.querySelector("div").style.backgroundImage  = `url(${bgUrl[8]})`;
                })
                cs.forEach((c)=>{
                    c.querySelector("div").style.backgroundImage  = `url(${bgUrl[9]})`;
                })
            }
        }

        function cal(){
            document.querySelector('.result').style.display = 'none';
            
            const aInput = document.querySelector('.A').valueAsNumber;
            const b = document.querySelector('.B').valueAsNumber;
            const c = document.querySelector('.C').valueAsNumber;
            var powderInput = document.querySelector('.powderInput').valueAsNumber;
            const gold = document.querySelector('.gold').value;
            if (!powderInput){
                powderInput = 0;
            }
            a = aInput + Math.floor(powderInput/100)*10;

            var aMaterial;
            var bMaterial;
            var cMaterial;
            if (mode === 0){
                aMaterial = 43;
                bMaterial = 59;
                cMaterial = 112;
            } else if (mode === 1){
                aMaterial = 33;
                bMaterial = 45;
                cMaterial = 86;
            } else {
                if (mode2 === 0){
                    aMaterial = 52;
                    bMaterial = 51;
                    cMaterial = 107;
                } else {
                    aMaterial = 52;
                    bMaterial = 69;
                    cMaterial = 142;
                }
            }

            const boxToPowder = Math.floor((a*10 + b*1.6 + c*0.8) / (aMaterial*10 + bMaterial*1.6 + cMaterial*0.8));
            const boxToA = Math.floor(a / aMaterial);
            const boxToB = Math.floor(b / bMaterial);
            const boxToC = Math.floor(c / cMaterial);
            var resultBox = Math.min(boxToPowder, boxToB, boxToC);
            const aSmall = boxToA < resultBox;
            
            var resultB, resultC, resultA;
            if (aSmall) {
                var needPowder = Math.ceil((resultBox*aMaterial - a)/10)*100;
                
                if (resultBox === boxToPowder){
                    resultB = Math.floor((b - resultBox*bMaterial) / 50);
                    resultC = Math.floor((c - resultBox*cMaterial) / 100);
                    resultBox = Math.min(Math.floor((Math.floor(((resultB+resultC)*80)/100)*10 + a) / aMaterial), resultBox);
                    needPowder = Math.ceil((resultBox*aMaterial - a)/10)*100;
                    const spareChange = (resultB + resultC) - Math.ceil(needPowder / 80);
                    if (spareChange >= 1){
                        if (resultB > resultC){
                            resultB -= spareChange;
                        } else {
                            resultC -= spareChange;
                        }
                    }
                } else if (resultBox === boxToB){
                    resultB = 0;
                    resultC = Math.ceil(needPowder / 80);
                } else if (resultBox === boxToC){
                    resultB = Math.ceil(needPowder / 80);
                    resultC = 0;
                }
            } else{
                resultB = 0;
                resultC = 0;
            }
            resultA = Math.max(Math.ceil((resultBox*aMaterial - aInput)/10), 0);
            const resultGold = resultBox * gold;

            const result= document.querySelector('.result');;
            result.querySelector('.resultA').innerHTML = "x"+resultA;
            result.querySelector('.resultB').innerHTML = "x"+resultB;
            result.querySelector('.resultC').innerHTML = "x"+resultC;
            result.querySelector('.resultBox').innerHTML = "x"+resultBox;
            result.querySelector('.resultGold').innerHTML = "x"+resultGold + "G";

            result.style.display = 'flex';
        }
        const form = document.getElementById('calForm');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            cal();
        });

        const mokokoWrap = document.getElementById('mokokoWrap');
        const mokokoBubble = document.getElementById('mokokoBubble');
        let hideTimer = null;

        function showBubble() {
            clearTimeout(hideTimer);

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, doc, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxCa5vzAgLkzL06KukH9iqnL3X-QZLNOI",
            authDomain: "myportfolio-a7062.firebaseapp.com",
            projectId: "myportfolio-a7062",
            storageBucket: "myportfolio-a7062.appspot.com",
            messagingSenderId: "866493693267",
            appId: "1:866493693267:web:7e576c9d6804da4289b5a6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const today = new Date().toISOString().slice(0, 10);
        const isNewVisitor = localStorage.getItem('visitedToday') !== today;
        const docRef = doc(db, 'visitorStats', 'loagogoCounts');

        try {
            await runTransaction(db, async (transaction) => {
                const docSnap = await transaction.get(docRef);
                const data = docSnap.data();

                const isNewDay = data.lastVisited !== today;
                let newToday = isNewDay ? 0 : data.todayVisitors;
                let newTotal = data.totalVisitors;

                if (isNewVisitor) {
                    newToday += 1;
                    newTotal += 1;
                }

                transaction.update(docRef, {
                    lastVisited: today,
                    todayVisitors: newToday,
                    totalVisitors: newTotal
                });
            });

            if (isNewVisitor) {
                localStorage.setItem('visitedToday', today);
            }

            const snap = await getDoc(docRef);
            const data = snap.data();
            document.getElementById('todayCount').textContent = data.todayVisitors;
            document.getElementById('totalCount').textContent = data.totalVisitors;

        } catch (e) {
            console.error('방문자 수 오류:', e);
        }
    </script>
